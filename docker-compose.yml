services:
  postgres:
    image: postgres:16-alpine
    container_name: webdev_path_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webdev_path
      POSTGRES_USER: webdev
      POSTGRES_PASSWORD: webdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webdev -d webdev_path"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

